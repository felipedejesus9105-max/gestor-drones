<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestor de Ensamble de Drones</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
height:100vh;
}

.sidebar{
width:300px;
background:#1e293b;
color:white;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
text-align:center;
}

.projectItem{
background:#334155;
padding:10px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.projectItem:hover{
background:#475569;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select,textarea{
padding:8px;
margin:5px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.verde{background:#bbf7d0;}
.amarillo{background:#fef08a;}
.rojo{background:#fecaca;}

.progressBar{
height:15px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
background:#22c55e;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Proyectos</h2>

<button onclick="nuevoProyecto()">Nuevo proyecto</button>

<input id="buscador" placeholder="Buscar proyecto..." onkeyup="buscarProyecto()" style="width:100%">

<br><br>

<button onclick="descargarBackup()">Descargar respaldo</button>
<input type="file" onchange="restaurarBackup(event)">

<hr>

<div id="listaProyectos"></div>

</div>

<div class="main">

<div class="card">

<h2>Proyecto</h2>

<input id="proyecto" placeholder="Nombre del proyecto">
<input type="date" id="fecha">

<br>

<label>Tipo de dron</label>

<select id="tipoDron"></select>

<button onclick="nuevoTipoDron()">Agregar tipo</button>

<br>

<input type="number" id="cantidad" placeholder="Cantidad de drones">

<br>

<label>Estado</label>

<select id="estado">
<option>En proceso</option>
<option>Completado</option>
<option>Entregado</option>
</select>

<label>Fecha entrega</label>
<input type="date" id="fechaEntrega">

<br>

<textarea id="comentarios" placeholder="Comentarios" rows="3" style="width:100%"></textarea>

<br>

<button onclick="generarMaterial()">Generar materiales</button>
<button onclick="guardarProyecto()">Guardar proyecto</button>
<button onclick="exportarPDF()">Exportar PDF</button>

</div>

<div class="card">

<h2>Progreso del proyecto</h2>

<div class="progressBar">
<div class="progress" id="barraProgreso" style="width:0%"></div>
</div>

<p id="porcentaje">0%</p>

</div>

<div class="card">

<h2>Materiales</h2>

<table id="tablaMaterial">

<thead>
<tr>
<th>Material</th>
<th>Necesario</th>
<th>Disponible</th>
<th>Estado</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let tiposDron = JSON.parse(localStorage.getItem("tiposDron")) || {

"Drone DR001":[
{nombre:"Motor",cantidad:4},
{nombre:"Helices",cantidad:4},
{nombre:"ESC",cantidad:1},
{nombre:"Flycontroller",cantidad:1},
{nombre:"GPS",cantidad:1}
],

"Drone DR002":[
{nombre:"Motor",cantidad:6},
{nombre:"Helices",cantidad:6},
{nombre:"ESC",cantidad:1},
{nombre:"Flycontroller",cantidad:1},
{nombre:"GPS",cantidad:1}
]

}

let proyectoActual=null

function cargarTipos(){

const select=document.getElementById("tipoDron")

select.innerHTML=""

Object.keys(tiposDron).forEach(tipo=>{

const option=document.createElement("option")

option.value=tipo
option.textContent=tipo

select.appendChild(option)

})

}

function nuevoTipoDron(){

const nombre=prompt("Nombre del nuevo dron")

if(!nombre) return

tiposDron[nombre]=[]

let agregar=true

while(agregar){

const material=prompt("Material")

if(!material) break

const cantidad=parseInt(prompt("Cantidad por dron"))

tiposDron[nombre].push({nombre:material,cantidad:cantidad})

agregar=confirm("Agregar otro material?")

}

localStorage.setItem("tiposDron",JSON.stringify(tiposDron))

cargarTipos()

}

function generarMaterial(){

const drones=document.getElementById("cantidad").value
const tipo=document.getElementById("tipoDron").value

const tabla=document.querySelector("#tablaMaterial tbody")

tabla.innerHTML=""

const materiales=tiposDron[tipo]

materiales.forEach(mat=>{

const necesario=mat.cantidad*drones

const fila=document.createElement("tr")

fila.innerHTML=`
<td>${mat.nombre}</td>
<td>${necesario}</td>
<td><input type="number" value="0" onchange="actualizarEstado(this,${necesario})"></td>
<td class="rojo">No disponible</td>
`

tabla.appendChild(fila)

})

}

function actualizarEstado(input,necesario){

const disponible=parseInt(input.value)

const estado=input.parentElement.nextElementSibling

estado.classList.remove("verde","amarillo","rojo")

if(disponible>=necesario){

estado.textContent="Completo"
estado.classList.add("verde")

}else if(disponible>0){

estado.textContent="Incompleto"
estado.classList.add("amarillo")

}else{

estado.textContent="No disponible"
estado.classList.add("rojo")

}

calcularProgreso()

}

function calcularProgreso(){

const filas=document.querySelectorAll("#tablaMaterial tbody tr")

let total=filas.length
let completos=0

filas.forEach(f=>{

if(f.children[3].innerText=="Completo") completos++

})

let porcentaje=Math.round((completos/total)*100)

document.getElementById("barraProgreso").style.width=porcentaje+"%"
document.getElementById("porcentaje").innerText=porcentaje+"%"

}

function obtenerProyectos(){

return JSON.parse(localStorage.getItem("proyectosDrones")) || []

}

function guardarProyecto(){

let proyectos=obtenerProyectos()

const materiales=[]

document.querySelectorAll("#tablaMaterial tbody tr").forEach(fila=>{

materiales.push({
nombre:fila.children[0].innerText,
necesario:fila.children[1].innerText,
disponible:fila.children[2].querySelector("input").value,
estado:fila.children[3].innerText
})

})

const data={
id: proyectoActual || Date.now(),
nombre:document.getElementById("proyecto").value,
fecha:document.getElementById("fecha").value,
tipo:document.getElementById("tipoDron").value,
drones:document.getElementById("cantidad").value,
estado:document.getElementById("estado").value,
fechaEntrega:document.getElementById("fechaEntrega").value,
comentarios:document.getElementById("comentarios").value,
materiales
}

if(proyectoActual){

proyectos=proyectos.map(p=>p.id===proyectoActual ? data : p)

}else{

proyectos.push(data)
proyectoActual=data.id

}

localStorage.setItem("proyectosDrones",JSON.stringify(proyectos))

respaldoAutomatico()

cargarLista()

alert("Proyecto guardado")

}

function cargarLista(){

const cont=document.getElementById("listaProyectos")

cont.innerHTML=""

const proyectos=obtenerProyectos()

proyectos.forEach(p=>{

const div=document.createElement("div")

div.className="projectItem"

div.innerHTML=`
<b>${p.nombre}</b><br>
${p.tipo}<br>
<small>${p.fecha}</small>
`

div.onclick=()=>abrirProyecto(p.id)

cont.appendChild(div)

})

}

function buscarProyecto(){

const filtro=document.getElementById("buscador").value.toLowerCase()

document.querySelectorAll(".projectItem").forEach(p=>{

p.style.display=p.innerText.toLowerCase().includes(filtro)?"block":"none"

})

}

function respaldoAutomatico(){

const data={
proyectos:obtenerProyectos(),
tipos:tiposDron
}

localStorage.setItem("backupAutoDrones",JSON.stringify(data))

}

function descargarBackup(){

const data={
proyectos:obtenerProyectos(),
tipos:tiposDron
}

const blob=new Blob([JSON.stringify(data)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="respaldo_drones.json"

a.click()

}

function restaurarBackup(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

const data=JSON.parse(reader.result)

localStorage.setItem("proyectosDrones",JSON.stringify(data.proyectos))
localStorage.setItem("tiposDron",JSON.stringify(data.tipos))

location.reload()

}

reader.readAsText(file)

}

function abrirProyecto(id){

const proyectos=obtenerProyectos()

const p=proyectos.find(x=>x.id===id)

proyectoActual=id

document.getElementById("proyecto").value=p.nombre
document.getElementById("fecha").value=p.fecha
document.getElementById("cantidad").value=p.drones
document.getElementById("tipoDron").value=p.tipo
document.getElementById("estado").value=p.estado
document.getElementById("fechaEntrega").value=p.fechaEntrega
document.getElementById("comentarios").value=p.comentarios

const tabla=document.querySelector("#tablaMaterial tbody")

tabla.innerHTML=""

p.materiales.forEach(mat=>{

let clase="rojo"

if(mat.estado=="Completo") clase="verde"
if(mat.estado=="Incompleto") clase="amarillo"

const fila=document.createElement("tr")

fila.innerHTML=`
<td>${mat.nombre}</td>
<td>${mat.necesario}</td>
<td>
<input type="number" value="${mat.disponible}" onchange="actualizarEstado(this,${mat.necesario})">
</td>
<td class="${clase}">${mat.estado}</td>
`

tabla.appendChild(fila)

})

calcularProgreso()

}

function nuevoProyecto(){

proyectoActual=null

document.getElementById("proyecto").value=""
document.getElementById("fecha").value=""
document.getElementById("cantidad").value=""
document.getElementById("comentarios").value=""
document.querySelector("#tablaMaterial tbody").innerHTML=""

document.getElementById("barraProgreso").style.width="0%"
document.getElementById("porcentaje").innerText="0%"

}

function exportarPDF(){

const { jsPDF } = window.jspdf
const pdf = new jsPDF()

const proyecto = document.getElementById("proyecto").value
const fecha = document.getElementById("fecha").value
const tipo = document.getElementById("tipoDron").value
const cantidad = document.getElementById("cantidad").value
const estado = document.getElementById("estado").value
const fechaEntrega = document.getElementById("fechaEntrega").value
const comentarios = document.getElementById("comentarios").value

pdf.setFontSize(20)
pdf.text("Reporte de Ensamble de Drone",20,20)

pdf.setFontSize(12)

pdf.text("Proyecto: "+proyecto,20,35)
pdf.text("Fecha inicio: "+fecha,20,42)
pdf.text("Tipo de dron: "+tipo,20,49)
pdf.text("Cantidad de drones: "+cantidad,20,56)
pdf.text("Estado: "+estado,20,63)
pdf.text("Fecha entrega: "+fechaEntrega,20,70)

let materiales=[]

document.querySelectorAll("#tablaMaterial tbody tr").forEach(fila=>{

const c=fila.children

materiales.push([
c[0].innerText,
c[1].innerText,
c[2].querySelector("input").value,
c[3].innerText
])

})

pdf.autoTable({

startY:80,

head:[["Material","Necesario","Disponible","Estado"]],

body:materiales,

theme:"grid",

styles:{
halign:"center"
},

headStyles:{
fillColor:[37,99,235]
}

})

let finalY = pdf.lastAutoTable.finalY + 10

pdf.text("Comentarios:",20,finalY)

pdf.text(comentarios || "Ninguno",20,finalY+7)

pdf.save("reporte_proyecto_drone.pdf")

}

cargarTipos()
cargarLista()

</script>

</body>
</html>
